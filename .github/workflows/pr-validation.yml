name: PR Validation

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Merge Quality Gate
    uses: ./.github/workflows/reusable-python-quality.yml
    with:
      python-version: "3.11"
      run-mock-pipeline: true
      upload-generated-artifacts: false
