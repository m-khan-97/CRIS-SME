name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semantic version tag to release (for example, v0.2.0).
        required: true
        default: v0.1.0
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Pre-release Validation
    uses: ./.github/workflows/reusable-python-quality.yml
    with:
      python-version: "3.11"
      run-mock-pipeline: false
      upload-generated-artifacts: false

  build-release:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.release_tag }}"
          fi

          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid release tag: $tag"
            echo "Expected semantic version format such as v1.2.3."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build deterministic static site bundle
        run: |
          python scripts/build_static_site_bundle.py --collector mock --reports-dir outputs/reports --figures-dir outputs/figures --dist-dir dist

      - name: Package release archives
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          mkdir -p dist/release
          tar -czf "dist/release/cris-sme-site-${tag}.tar.gz" -C dist site
          tar -czf "dist/release/cris-sme-reports-${tag}.tar.gz" outputs/reports outputs/figures
          (cd dist && zip -r "release/cris-sme-site-${tag}.zip" site)

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cris-sme-release-${{ steps.meta.outputs.tag }}
          path: |
            dist/release
            dist/manifests/build-metadata.json
          retention-days: 30

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/release/cris-sme-site-${{ steps.meta.outputs.tag }}.tar.gz
            dist/release/cris-sme-site-${{ steps.meta.outputs.tag }}.zip
            dist/release/cris-sme-reports-${{ steps.meta.outputs.tag }}.tar.gz
            dist/manifests/build-metadata.json
