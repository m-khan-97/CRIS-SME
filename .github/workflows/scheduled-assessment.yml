name: Scheduled Assessment

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      collector_mode:
        description: Collector mode (`auto`, `mock`, `azure`).
        required: true
        default: auto
        type: choice
        options:
          - auto
          - mock
          - azure

permissions:
  contents: read

concurrency:
  group: scheduled-assessment
  cancel-in-progress: false

jobs:
  assessment:
    name: Periodic Assessment Generation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REQUESTED_COLLECTOR_MODE: ${{ github.event.inputs.collector_mode || 'auto' }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      CRIS_SME_OUTPUT_DIR: outputs/reports
      CRIS_SME_FIGURE_DIR: outputs/figures

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve collector mode
        id: collector
        shell: bash
        run: |
          requested="${REQUESTED_COLLECTOR_MODE:-auto}"
          selected="mock"

          if [ "$requested" = "mock" ]; then
            selected="mock"
          elif [ "$requested" = "azure" ]; then
            if [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]; then
              selected="azure"
            else
              echo "::warning::Azure mode requested but Azure credentials were not configured. Falling back to mock mode."
              selected="mock"
            fi
          else
            if [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]; then
              selected="azure"
            else
              selected="mock"
            fi
          fi

          echo "requested=$requested" >> "$GITHUB_OUTPUT"
          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Run assessment with selected collector
        id: run_selected
        continue-on-error: true
        shell: bash
        run: |
          PYTHONPATH=src python scripts/run_assessment_snapshot.py --collector "${{ steps.collector.outputs.selected }}" > /tmp/cris_sme_scheduled_run.json

      - name: Fallback to mock if Azure run fails
        if: ${{ steps.collector.outputs.selected == 'azure' && steps.run_selected.outcome != 'success' }}
        shell: bash
        run: |
          echo "::warning::Azure collector execution failed in scheduled run. Re-running safely in mock mode."
          PYTHONPATH=src python scripts/run_assessment_snapshot.py --collector mock > /tmp/cris_sme_scheduled_run_fallback.json

      - name: Finalize collector mode
        id: final
        shell: bash
        run: |
          final_mode="${{ steps.collector.outputs.selected }}"
          fallback_used="false"
          if [ "$final_mode" = "azure" ] && [ "${{ steps.run_selected.outcome }}" != "success" ]; then
            final_mode="mock"
            fallback_used="true"
          fi

          echo "final_mode=$final_mode" >> "$GITHUB_OUTPUT"
          echo "fallback_used=$fallback_used" >> "$GITHUB_OUTPUT"

      - name: Generate regression summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("outputs/reports/cris_sme_report.json").read_text(encoding="utf-8"))
          history = report.get("history_comparison", {}) if isinstance(report, dict) else {}
          score = report.get("overall_risk_score", 0.0)
          new_findings = history.get("new_findings_count", 0)
          resolved_findings = history.get("resolved_findings_count", 0)
          recurrent = history.get("recurring_regression_count", 0)

          lines = [
              "## Scheduled Assessment Summary",
              "",
              f"- Requested collector mode: `{os.environ.get('REQUESTED_COLLECTOR_MODE', 'auto')}`",
              f"- Executed collector mode: `${{ steps.final.outputs.final_mode }}`",
              f"- Azure fallback used: `${{ steps.final.outputs.fallback_used }}`",
              f"- Overall risk score: `{score}`",
              f"- New findings vs previous: `{new_findings}`",
              f"- Resolved findings vs previous: `{resolved_findings}`",
              f"- Recurring regressions: `{recurrent}`",
              "",
              "Artifacts uploaded: `outputs/reports` and `outputs/figures`.",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Upload assessment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cris-sme-scheduled-${{ steps.final.outputs.final_mode }}-${{ github.run_number }}
          path: |
            outputs/reports
            outputs/figures
          if-no-files-found: error
          retention-days: 21
