name: Build Static Site Artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      collector_mode:
        description: Collector mode (`mock` or `azure`).
        required: true
        default: mock
        type: choice
        options:
          - mock
          - azure

permissions:
  contents: read

concurrency:
  group: static-site-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Pre-build Validation
    uses: ./.github/workflows/reusable-python-quality.yml
    with:
      python-version: "3.11"
      run-mock-pipeline: false
      upload-generated-artifacts: false

  build-site:
    name: Generate Reports and Build Static Site Bundle
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    env:
      REQUESTED_COLLECTOR_MODE: ${{ github.event.inputs.collector_mode || 'mock' }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve collector mode
        id: collector
        shell: bash
        run: |
          requested="${REQUESTED_COLLECTOR_MODE:-mock}"
          selected="mock"

          if [ "$requested" = "azure" ]; then
            if [ -n "${AZURE_SUBSCRIPTION_ID:-}" ]; then
              selected="azure"
            else
              echo "::warning::Azure collector requested but Azure credentials were not configured. Falling back to mock mode."
              selected="mock"
            fi
          fi

          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Build deterministic static site bundle
        run: |
          python scripts/build_static_site_bundle.py --collector "${{ steps.collector.outputs.selected }}" --reports-dir outputs/reports --figures-dir outputs/figures --dist-dir dist

      - name: Upload build bundle
        uses: actions/upload-artifact@v4
        with:
          name: static-site-bundle
          path: dist
          retention-days: 14

      - name: Build metadata summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          manifest = json.loads(Path("dist/manifests/build-metadata.json").read_text(encoding="utf-8"))
          build = manifest.get("build", {})
          summary = [
            "## Static Site Build Bundle",
            "",
            f"- Commit: `{build.get('commit_sha', 'unknown')}`",
            f"- Ref: `{build.get('ref', 'unknown')}`",
            f"- Run ID: `{build.get('run_id', 'unknown')}`",
            f"- Python: `{build.get('python_version', 'unknown')}`",
            f"- Project version: `{manifest.get('project_version', 'unknown')}`",
            "- Bundle root: `dist/site/`",
            "- Key pages: `index.html`, `dashboard.html`, `report.html`",
            "- Deployment target: `Vercel (Option 1 direct Git integration)`",
            f"- Collector mode used: `${{ steps.collector.outputs.selected }}`",
          ]
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as handle:
            handle.write("\n".join(summary) + "\n")
          PY
        shell: bash
