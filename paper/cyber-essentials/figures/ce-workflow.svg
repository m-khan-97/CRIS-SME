<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Essentials Evidence Workflow</title>
  <desc id="desc">Workflow from cloud evidence through deterministic controls, answer pack, human review, and paper exports.</desc>
<rect width="960" height="360" fill="#ffffff"/>
<text x="40.0" y="48.0" font-family="Inter, Arial, sans-serif" font-size="24" fill="#172033" font-weight="700">Cyber Essentials Evidence Workflow</text>
<text x="40.0" y="76.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#617083">Deterministic scoring stays upstream; human review never changes CRIS-SME risk scores</text>
<rect x="40" y="135" width="156" height="94" rx="8" fill="#f8fafc" stroke="#d8e2ec"/>
<text x="54.0" y="163.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="700">Cloud evidence</text>
<text x="54.0" y="189.0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#617083">Azure collector + normalized CRIS profile</text>
<line x1="202" y1="182" x2="218" y2="182" stroke="#2563eb" stroke-width="2"/>
<path d="M 218 177 L 228 182 L 218 187 Z" fill="#2563eb"/>
<rect x="224" y="135" width="156" height="94" rx="8" fill="#f8fafc" stroke="#d8e2ec"/>
<text x="238.0" y="163.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="700">Deterministic controls</text>
<text x="238.0" y="189.0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#617083">26 controls across 6 cloud risk domains</text>
<line x1="386" y1="182" x2="402" y2="182" stroke="#2563eb" stroke-width="2"/>
<path d="M 402 177 L 412 182 L 402 187 Z" fill="#2563eb"/>
<rect x="408" y="135" width="156" height="94" rx="8" fill="#f8fafc" stroke="#d8e2ec"/>
<text x="422.0" y="163.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="700">CE answer pack</text>
<text x="422.0" y="189.0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#617083">28 cloud-supported entries</text>
<line x1="570" y1="182" x2="586" y2="182" stroke="#2563eb" stroke-width="2"/>
<path d="M 586 177 L 596 182 L 586 187 Z" fill="#2563eb"/>
<rect x="592" y="135" width="156" height="94" rx="8" fill="#f8fafc" stroke="#d8e2ec"/>
<text x="606.0" y="163.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="700">Human review</text>
<text x="606.0" y="189.0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#617083">23/23 accepted agreements</text>
<line x1="754" y1="182" x2="770" y2="182" stroke="#2563eb" stroke-width="2"/>
<path d="M 770 177 L 780 182 L 770 187 Z" fill="#2563eb"/>
<rect x="776" y="135" width="156" height="94" rx="8" fill="#f8fafc" stroke="#d8e2ec"/>
<text x="790.0" y="163.0" font-family="Inter, Arial, sans-serif" font-size="14" fill="#172033" font-weight="700">Paper exports</text>
<text x="790.0" y="189.0" font-family="Inter, Arial, sans-serif" font-size="11" fill="#617083">Tables, figures, ledger, and reproducibility artifacts</text>
<text x="40.0" y="320.0" font-family="Inter, Arial, sans-serif" font-size="12" fill="#617083">Figure 4. Evidence workflow. Review decisions are downstream artifacts and do not mutate deterministic findings or scores.</text>
</svg>
