<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Live Azure Versus Controlled Lab Category Scores</title>
  <desc id="desc">Grouped bar chart comparing live Azure and controlled lab category scores.</desc>
  <rect width="980" height="430" fill="#ffffff"/>
  <text x="40" y="46" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#172033">Live Azure vs Controlled Vulnerable Lab</text>
  <text x="40" y="74" font-family="Inter, Arial, sans-serif" font-size="14" fill="#617083">Category score comparison shows lab-induced network and data risk contrast</text>
  <line x1="150" y1="330" x2="930" y2="330" stroke="#d8e2ec"/>
  <line x1="150" y1="110" x2="150" y2="330" stroke="#d8e2ec"/>
  <g stroke="#edf2f7">
    <line x1="150" y1="286" x2="930" y2="286"/>
    <line x1="150" y1="242" x2="930" y2="242"/>
    <line x1="150" y1="198" x2="930" y2="198"/>
    <line x1="150" y1="154" x2="930" y2="154"/>
    <line x1="150" y1="110" x2="930" y2="110"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#617083">
    <text x="128" y="334" text-anchor="end">0</text>
    <text x="128" y="290" text-anchor="end">20</text>
    <text x="128" y="246" text-anchor="end">40</text>
    <text x="128" y="202" text-anchor="end">60</text>
    <text x="128" y="158" text-anchor="end">80</text>
    <text x="128" y="114" text-anchor="end">100</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="760" y="42" width="18" height="18" fill="#2563eb"/><text x="786" y="56" font-size="13" fill="#172033">Live Azure</text>
    <rect x="860" y="42" width="18" height="18" fill="#dc2626"/><text x="886" y="56" font-size="13" fill="#172033">Controlled lab</text>
    <g>
      <rect x="180" y="258" width="24" height="72" fill="#2563eb"/><rect x="208" y="258" width="24" height="72" fill="#dc2626"/>
      <text x="206" y="354" font-size="12" fill="#172033" text-anchor="middle">IAM</text>
      <rect x="300" y="330" width="24" height="0" fill="#2563eb"/><rect x="328" y="201" width="24" height="129" fill="#dc2626"/>
      <text x="326" y="354" font-size="12" fill="#172033" text-anchor="middle">Network</text>
      <rect x="420" y="245" width="24" height="85" fill="#2563eb"/><rect x="448" y="238" width="24" height="92" fill="#dc2626"/>
      <text x="446" y="354" font-size="12" fill="#172033" text-anchor="middle">Data</text>
      <rect x="540" y="250" width="24" height="80" fill="#2563eb"/><rect x="568" y="250" width="24" height="80" fill="#dc2626"/>
      <text x="566" y="354" font-size="12" fill="#172033" text-anchor="middle">Monitoring</text>
      <rect x="660" y="246" width="24" height="84" fill="#2563eb"/><rect x="688" y="246" width="24" height="84" fill="#dc2626"/>
      <text x="686" y="354" font-size="12" fill="#172033" text-anchor="middle">Compute</text>
      <rect x="780" y="270" width="24" height="60" fill="#2563eb"/><rect x="808" y="270" width="24" height="60" fill="#dc2626"/>
      <text x="806" y="354" font-size="12" fill="#172033" text-anchor="middle">Governance</text>
    </g>
  </g>
  <text x="40" y="408" font-family="Inter, Arial, sans-serif" font-size="12" fill="#617083">Figure 3. Live Azure clean run: Network 0.00, Data 38.44. Controlled lab: Network 58.42, Data 41.74.</text>
